spring.application.name=oyuki-backend
server.port=${PORT:8080}
server.address=0.0.0.0

# Database: Railway variables in production, local MySQL defaults for development
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/oyuki_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# Security
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false
server.error.include-stacktrace=never

# Persistent uploads (mount Railway volume at /app/uploads)
app.upload.root=${FILE_UPLOAD_ROOT:uploads}
app.upload.payment-receipts=${PAYMENT_RECEIPT_UPLOAD_DIR:${FILE_UPLOAD_ROOT:uploads}/payment-receipts}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
app.admin.notification-email=${OYUKI_ADMIN_EMAIL:}

# Gmail OTP / newsletter
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${OYUKI_MAIL_USERNAME:}
spring.mail.password=${OYUKI_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${OYUKI_MAIL_USERNAME:}

# Twilio Verify OTP
app.sms.enabled=${OYUKI_SMS_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:}

# Contact support
app.contact.support-email=${OYUKI_SUPPORT_EMAIL:${OYUKI_MAIL_USERNAME:}}
