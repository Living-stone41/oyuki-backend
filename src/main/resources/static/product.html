<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product | Oyuki</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="oy-navbar"></div>
<div class="container section" id="body"></div>
<div id="oy-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>

document.addEventListener('DOMContentLoaded', async () => {
  const body=document.getElementById('body'), id=new URLSearchParams(location.search).get('id');
  if(!id){ body.innerHTML='<p>Product not found.</p>'; return; }
  body.innerHTML='<p class="text-muted">Loading product…</p>';
  try {
    const p=await Oyuki.Products.get(id); Oyuki.Recommendations.record(p); const variants=p.variants||[]; const available=variants.filter(v=>v.available&&Number(v.stockQuantity)>0); const first=available[0]||variants[0];
    body.innerHTML=`<div class="row g-4"><div class="col-md-6"><div class="hero-img"><img src="${p.image}" alt="${Oyuki.escapeHtml(p.name)}" onerror="this.src='assets/images/hero.jpg'"></div></div><div class="col-md-6"><span class="badge-soft">${Oyuki.escapeHtml(p.category||'')}</span><h1 class="mt-2">${Oyuki.escapeHtml(p.name)}</h1><div class="rating mb-2">★ ${p.rating.toFixed(1)} · <span class="text-muted small">${Oyuki.escapeHtml(p.ownerName||'')}</span></div><p class="text-muted">${Oyuki.escapeHtml(p.description||'')}</p><label class="form-label">Size / measurement</label><select id="variant" class="form-select mb-3">${variants.map(v=>`<option value="${v.id}" data-price="${v.price}" ${(!v.available||Number(v.stockQuantity)<=0)?'disabled':''}>${Number(v.measurementValue).toLocaleString()} ${String(v.measurementUnit).replaceAll('_',' ')} — ${Oyuki.fmt(v.price)} (${v.stockQuantity} left)</option>`).join('')}</select><h3 id="price" class="text-success">${Oyuki.fmt(first?.price||0)}</h3><div class="d-flex gap-2 align-items-center mt-3"><input id="qty" type="number" value="${first?.minimumOrderQuantity||1}" min="${first?.minimumOrderQuantity||1}" class="form-control" style="width:90px"><button id="addBtn" class="btn btn-brand" ${first?'':'disabled'}><i class="bi bi-basket2"></i> Add to cart</button><button class="btn btn-outline-brand" data-saved="false" onclick="Oyuki.Wishlist.toggle(${p.id},this)"><i class="bi bi-heart"></i></button><a class="btn btn-outline-brand" href="chat.html?recipientId=${p.ownerId}&productId=${p.id}&name=${encodeURIComponent(p.ownerName||'Seller')}"><i class="bi bi-chat-dots"></i> Message seller</a></div></div></div>`;
    const select=document.getElementById('variant'); select.addEventListener('change',()=>document.getElementById('price').textContent=Oyuki.fmt(select.selectedOptions[0].dataset.price));
    document.getElementById('addBtn').addEventListener('click',()=>Oyuki.addToCart(select.value,Number(document.getElementById('qty').value)));
    try { const check=await Oyuki.Wishlist.check(p.id); const btn=body.querySelector('[data-saved]'); btn.dataset.saved=String(check.saved); btn.innerHTML=`<i class="bi bi-heart${check.saved?'-fill':''}"></i>`; } catch(_){}
  } catch(error){ body.innerHTML=`<div class="alert alert-danger">${Oyuki.escapeHtml(error.message)}</div>`; }
});

</script>
</body></html>
