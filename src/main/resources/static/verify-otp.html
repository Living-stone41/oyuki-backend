<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verify OTP | Oyuki</title><link rel="icon" href="/favicon.ico"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"><style>
.otp-page{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 15% 15%,rgba(22,138,74,.12),transparent 30%),#f7faf8}.otp-card{width:min(100%,460px);background:#fff;border:1px solid #e3ebe6;border-radius:26px;box-shadow:0 25px 70px rgba(28,69,50,.12);padding:20px 34px 36px}.otp-top{display:grid;grid-template-columns:40px 1fr 40px;align-items:center}.otp-back{width:40px;height:40px;border:0;background:#fff;border-radius:50%}.otp-titlebar{text-align:center;font-weight:750}.otp-art{width:150px;height:150px;margin:8px auto 4px;display:grid;place-items:center;border-radius:50%;background:var(--oy-soft);color:var(--oy-green);font-size:4.2rem}.otp-card h1{text-align:center;font:700 1.65rem Poppins,sans-serif}.otp-copy{text-align:center;color:var(--oy-muted);font-size:.9rem}.otp-contact{font-weight:750;color:var(--oy-ink)}.otp-inputs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:25px 0 15px}.otp-digit{min-width:0;width:100%;height:57px;border:1px solid #dce5df;border-radius:12px;background:#f9fbfa;text-align:center;font-size:1.35rem;font-weight:750;outline:none}.otp-digit:focus,.otp-digit.filled{border-color:var(--oy-green);box-shadow:0 0 0 3px rgba(22,138,74,.1)}.otp-message{display:none;padding:11px;border-radius:10px;font-size:.86rem;margin-bottom:12px}.otp-message.show{display:block}.otp-message.error{background:#fff0f1;color:#b92f38}.otp-message.success{background:var(--oy-soft);color:var(--oy-dark)}.resend{text-align:center;margin-top:18px;font-size:.86rem;color:var(--oy-muted)}.resend button{border:0;background:transparent;color:var(--oy-green);font-weight:750}.resend button:disabled{color:#9aa49e}.change-contact{display:flex;justify-content:center;gap:6px;margin-top:15px;color:var(--oy-muted);font-size:.82rem;text-decoration:none}@media(max-width:520px){.otp-page{padding:0;background:#fff}.otp-card{min-height:100vh;width:100%;border:0;border-radius:0;box-shadow:none;padding:18px 20px 35px}}</style></head><body><main class="otp-page"><section class="otp-card"><div class="otp-top"><button class="otp-back" onclick="goBack()"><i class="bi bi-chevron-left"></i></button><div class="otp-titlebar">OTP Verification</div><span></span></div><div class="otp-art"><i class="bi bi-shield-check"></i></div><h1>OTP Code Verification</h1><p class="otp-copy">We sent a six-digit code to <span id="maskedContact" class="otp-contact">your contact</span>. Enter the code below to verify.</p><form id="otpForm"><div class="otp-inputs"><input class="otp-digit" inputmode="numeric" maxlength="1" autocomplete="one-time-code"><input class="otp-digit" inputmode="numeric" maxlength="1"><input class="otp-digit" inputmode="numeric" maxlength="1"><input class="otp-digit" inputmode="numeric" maxlength="1"><input class="otp-digit" inputmode="numeric" maxlength="1"><input class="otp-digit" inputmode="numeric" maxlength="1"></div><div id="otpMessage" class="otp-message"></div><button id="verifyBtn" class="oy-submit">Verify account</button></form><div class="resend"><div>Didn't receive the code?</div><button id="resendBtn" disabled>Resend OTP in <span id="counter">60</span>s</button></div><a href="register.html" class="change-contact" id="changeContact"><i class="bi bi-arrow-left"></i> Use a different email or phone number</a></section></main><script src="assets/js/app.js"></script><script>
const inputs=[...document.querySelectorAll('.otp-digit')],msg=document.getElementById('otpMessage'),resend=document.getElementById('resendBtn');const contact=(new URLSearchParams(location.search).get('contact')||Oyuki.Auth.pendingContact()||'').trim();document.getElementById('maskedContact').textContent=mask(contact);function mask(v){if(!v)return 'your email or phone';if(v.includes('@')){const a=v.split('@');return a[0].slice(0,2)+'***@'+a[1]}return '*'.repeat(Math.max(v.length-4,4))+v.slice(-4)}function show(t,k='error'){msg.textContent=t;msg.className='otp-message show '+k}function goBack(){localStorage.removeItem('oyuki_pending_contact');location.href='register.html'}document.getElementById('changeContact').onclick=e=>{e.preventDefault();goBack()};
inputs.forEach((input,i)=>{input.addEventListener('input',e=>{input.value=e.target.value.replace(/\D/g,'').slice(-1);input.classList.toggle('filled',!!input.value);if(input.value&&i<5)inputs[i+1].focus()});input.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!input.value&&i>0)inputs[i-1].focus()});input.addEventListener('paste',e=>{e.preventDefault();const d=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);inputs.forEach((x,j)=>{x.value=d[j]||'';x.classList.toggle('filled',!!x.value)});inputs[Math.min(d.length,5)].focus()})});
let sec=60,timer;function countdown(){clearInterval(timer);sec=60;resend.disabled=true;resend.innerHTML='Resend OTP in <span id="counter">60</span>s';timer=setInterval(()=>{sec--;const c=document.getElementById('counter');if(c)c.textContent=sec;if(sec<=0){clearInterval(timer);resend.disabled=false;resend.textContent='Resend OTP'}},1000)}countdown();
document.getElementById('otpForm').onsubmit=async e=>{e.preventDefault();const token=inputs.map(x=>x.value).join(''),b=document.getElementById('verifyBtn');if(!/^\d{6}$/.test(token)){show('Enter the complete six-digit code.');return}b.disabled=true;b.textContent='Verifying…';try{await Oyuki.Auth.verifyRegistration(contact,token);show('Account verified successfully. Redirecting to login…','success');setTimeout(()=>location.href='login.html?verified=true',1000)}catch(err){show(err.message);inputs.forEach(x=>{x.value='';x.classList.remove('filled')});inputs[0].focus()}finally{b.disabled=false;b.textContent='Verify account'}};
resend.onclick=async()=>{resend.disabled=true;resend.textContent='Sending…';try{const r=await Oyuki.Api.post('/auth/resend-registration-otp',{contact},false);show(r.message||'A new code has been sent.','success');inputs.forEach(x=>{x.value='';x.classList.remove('filled')});inputs[0].focus();countdown()}catch(err){show(err.message);resend.disabled=false;resend.textContent='Resend OTP'}};if(!contact){show('No registration contact was found. Return to registration.');document.getElementById('verifyBtn').disabled=true}else inputs[0].focus();
</script></body></html>
