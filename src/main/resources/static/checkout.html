<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout | Oyuki</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="oy-navbar"></div>
<section class="section"><div class="container"><h1>Checkout</h1><div class="row g-4 mt-1">
  <div class="col-lg-8">
    <div class="panel mb-3">
      <div class="d-flex justify-content-between align-items-center"><h5 class="mb-0">Saved delivery address</h5><button class="btn btn-sm btn-outline-brand" type="button" onclick="toggleAddressForm()">Add address</button></div>
      <select id="addressSelect" class="form-select mt-3"></select>
      <form id="addressForm" class="row g-3 mt-2" style="display:none" onsubmit="saveAddress(event)">
        <div class="col-md-4"><label class="form-label">Label</label><input id="aLabel" class="form-control" placeholder="Home" required maxlength="50"></div>
        <div class="col-md-4"><label class="form-label">Recipient name</label><input id="aName" class="form-control" required maxlength="150" data-letters-only data-validation-message="Recipient name must contain letters only."></div>
        <div class="col-md-4"><label class="form-label">Phone</label><input id="aPhone" class="form-control" inputmode="numeric" minlength="10" maxlength="15" data-numbers-only required></div>
        <div class="col-md-4"><label class="form-label">State</label><select id="aState" class="form-select" required></select></div>
        <div class="col-md-4"><label class="form-label">LGA</label><select id="aLga" class="form-select" required></select></div>
        <div class="col-md-4"><label class="form-label">Area</label><select id="aArea" class="form-select" required></select></div>
        <div class="col-12"><label class="form-label">Street address</label><input id="aStreet" class="form-control" required maxlength="500"></div>
        <div class="col-12"><label class="form-label">Landmark <span class="text-muted">(optional)</span></label><input id="aLandmark" class="form-control" maxlength="255"></div>
        <div class="col-12"><button class="btn btn-brand" type="submit">Save address</button></div>
      </form>
    </div>
    <div class="panel mb-3"><h5>Coupon</h5><div class="input-group"><input id="couponCode" class="form-control" placeholder="WELCOME10"><button id="couponBtn" class="btn btn-outline-brand" type="button" onclick="applyCoupon()">Apply</button></div><div id="couponMessage" class="small mt-2"></div></div>
    <div class="panel mb-3"><h5>Delivery instructions</h5><textarea id="instructions" class="form-control" rows="3" maxlength="1000" placeholder="Call me before arriving"></textarea></div>
    <div class="panel"><h5>Payment method</h5><select id="paymentMethod" class="form-select"><option value="BANK_TRANSFER">Bank transfer</option><option value="PAYSTACK">Paystack</option><option value="CARD">Card</option><option value="CASH_ON_DELIVERY">Cash on delivery</option></select><div id="paymentHelp" class="alert alert-info small mt-3 mb-0">After placing a bank-transfer order, open <strong>My Orders</strong> to upload your receipt for admin confirmation.</div></div>
  </div>
  <div class="col-lg-4"><div class="panel" id="sum"><p class="text-muted">Loading checkout…</p></div></div>
</div></div></section>
<div id="oy-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/nigeria-locations.js"></script>
<script>
let cart=null, addresses=[], delivery=null, coupon=null;
document.addEventListener('DOMContentLoaded',async()=>{
  if(!Oyuki.Auth.require('CUSTOMER'))return;
  Oyuki.Forms.bindGuards(document.getElementById('addressForm'));
  await OyukiLocations.bind({stateSelect:aState,lgaSelect:aLga,areaSelect:aArea,stateValue:'name'});
  paymentMethod.addEventListener('change',()=>paymentHelp.classList.toggle('d-none',paymentMethod.value!=='BANK_TRANSFER'));
  try{[cart,addresses]=await Promise.all([Oyuki.Cart.get(),Oyuki.Addresses.list()]);renderAddresses();await refreshFee();renderSummary();}
  catch(error){document.getElementById('sum').innerHTML=`<div class="alert alert-danger">${Oyuki.escapeHtml(error.message)}</div>`;}
});
function toggleAddressForm(){const form=document.getElementById('addressForm');form.style.display=form.style.display==='none'?'flex':'none';}
function renderAddresses(){const select=document.getElementById('addressSelect');select.innerHTML=addresses.length?addresses.map(a=>`<option value="${a.id}" ${a.defaultAddress?'selected':''}>${Oyuki.escapeHtml(a.label)} — ${Oyuki.escapeHtml(a.streetAddress)}, ${Oyuki.escapeHtml(a.area)}, ${Oyuki.escapeHtml(a.state)}</option>`).join(''):'<option value="">Add a delivery address</option>';select.onchange=async()=>{coupon=null;couponMessage.textContent='';await refreshFee();renderSummary();};}
async function saveAddress(event){event.preventDefault();const form=event.currentTarget;if(!form.reportValidity())return;try{const data={label:aLabel.value.trim(),recipientName:aName.value.trim(),phone:aPhone.value.trim(),state:aState.value,city:aLga.value,area:aArea.value,streetAddress:aStreet.value.trim(),landmark:aLandmark.value.trim()||null,postalCode:null,deliveryInstructions:null,defaultAddress:addresses.length===0};const created=await Oyuki.Addresses.create(data);addresses=await Oyuki.Addresses.list();renderAddresses();addressSelect.value=created.id;toggleAddressForm();form.reset();await OyukiLocations.bind({stateSelect:aState,lgaSelect:aLga,areaSelect:aArea,stateValue:'name'});await refreshFee();renderSummary();Oyuki.Toast.show('Address saved','success');}catch(error){Oyuki.Toast.show(error.message,'error');}}
async function refreshFee(){const id=Number(addressSelect.value);delivery=null;if(!id)return;try{delivery=await Oyuki.Delivery.calculate(id);}catch(error){Oyuki.Toast.show(error.message,'error');}}
async function applyCoupon(){const code=couponCode.value.trim();const addressId=Number(addressSelect.value);if(!code||!addressId){Oyuki.Toast.show('Choose an address and enter a coupon code.','error');return;}try{coupon=await Oyuki.Coupons.validate({code,deliveryType:'CUSTOMER_ADDRESS',addressId,destinationKitchenId:null});couponMessage.className='small mt-2 text-success';couponMessage.textContent=`${coupon.code} applied: -${Oyuki.fmt(coupon.discountAmount)}`;renderSummary();}catch(error){coupon=null;couponMessage.className='small mt-2 text-danger';couponMessage.textContent=error.message;renderSummary();}}
function renderSummary(){const sum=document.getElementById('sum');if(!cart?.items?.length){sum.innerHTML='<p class="text-muted">Your cart is empty. <a href="shop.html">Shop now</a>.</p>';return;}const subtotal=Number(cart.subtotal||0),fee=Number(delivery?.totalDeliveryFee||coupon?.deliveryFee||0),discount=Number(coupon?.discountAmount||0),total=Math.max(0,subtotal+fee-discount);sum.innerHTML=`<h5>Order summary</h5>${cart.items.map(i=>`<div class="d-flex justify-content-between small mb-1"><span>${Oyuki.escapeHtml(i.productName)} × ${i.quantity}</span><span>${Oyuki.fmt(i.lineTotal)}</span></div>`).join('')}<hr><div class="d-flex justify-content-between"><span>Subtotal</span><strong>${Oyuki.fmt(subtotal)}</strong></div><div class="d-flex justify-content-between mt-1"><span>Delivery</span><span>${delivery||coupon?Oyuki.fmt(fee):'Choose address'}</span></div>${discount?`<div class="d-flex justify-content-between text-success mt-1"><span>Coupon</span><span>-${Oyuki.fmt(discount)}</span></div>`:''}<hr><div class="d-flex justify-content-between fs-5"><span>Total</span><strong class="text-success">${Oyuki.fmt(total)}</strong></div>${delivery?`<div class="small text-muted mt-2">Estimated ${delivery.estimatedMinDays}–${delivery.estimatedMaxDays} day(s)</div>`:''}<button class="btn btn-brand w-100 mt-3" onclick="placeOrder()">Place order</button>`;}
async function placeOrder(){const addressId=Number(addressSelect.value);if(!addressId){Oyuki.Toast.show('Add or select a delivery address.','error');return;}try{const method=paymentMethod.value;const order=await Oyuki.Orders.checkout({deliveryType:'CUSTOMER_ADDRESS',paymentMethod:method,addressId,destinationKitchenId:null,couponCode:couponCode.value.trim()||null,recipientName:null,recipientPhone:null,state:null,lga:null,area:null,addressLine:null,deliveryInstructions:instructions.value.trim()||null});Oyuki.Toast.show('Order placed successfully!','success');if(method==='BANK_TRANSFER'){sessionStorage.setItem('oyuki_payment_order',String(order.id));setTimeout(()=>location.href='customer.html#orders',500);}else{setTimeout(()=>location.href='tracking.html?id='+order.id,500);}}catch(error){Oyuki.Toast.show(error.message,'error');}}
</script>
</body></html>
