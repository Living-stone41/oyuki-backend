<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset your password | Oyuki</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div class="auth-shell"><div class="auth-card">
  <div id="requestStep">
    <h2>Forgot password</h2>
    <p class="sub">Enter the email address or phone number registered on your Oyuki account.</p>
    <form id="requestForm">
      <div class="mb-3"><label class="form-label">Email or phone</label><input name="contact" class="form-control" required autocomplete="username"></div>
      <button id="requestBtn" class="btn btn-brand w-100">Send reset code</button>
    </form>
  </div>

  <div id="resetStep" style="display:none">
    <h2>Reset password</h2>
    <p class="sub">Enter the six-digit code sent to your email or phone.</p>
    <form id="resetForm">
      <div class="mb-3"><label class="form-label">Email or phone</label><input name="contact" class="form-control" required readonly></div>
      <div class="mb-3"><label class="form-label">Reset code</label><input name="token" inputmode="numeric" autocomplete="one-time-code" class="form-control" maxlength="6" pattern="[0-9]{6}" required></div>
      <div class="mb-3"><label class="form-label">New password</label><div class="input-group"><input id="newPassword" name="newPassword" type="password" minlength="8" class="form-control" required><button type="button" class="btn btn-outline-secondary" onclick="toggleResetPassword('newPassword',this)"><i class="bi bi-eye"></i></button></div></div>
      <div class="mb-3"><label class="form-label">Confirm new password</label><div class="input-group"><input id="confirmNewPassword" name="confirmPassword" type="password" minlength="8" class="form-control" required><button type="button" class="btn btn-outline-secondary" onclick="toggleResetPassword('confirmNewPassword',this)"><i class="bi bi-eye"></i></button></div></div>
      <button class="btn btn-brand w-100">Reset password</button>
    </form>
    <div class="text-center mt-3"><button id="resendResetBtn" type="button" class="btn btn-link text-decoration-none" disabled>Resend code in <span id="resetCounter">60</span>s</button></div>
  </div>
  <p class="text-center small text-muted mt-3 mb-0"><a href="login.html">Back to login</a></p>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
let resetContact='',resetSeconds=60,resetTimer;
function toggleResetPassword(id,b){const i=document.getElementById(id),x=b.querySelector('i');i.type=i.type==='password'?'text':'password';x.className=i.type==='password'?'bi bi-eye':'bi bi-eye-slash'}
function startResetCountdown(){clearInterval(resetTimer);resetSeconds=60;const btn=document.getElementById('resendResetBtn');btn.disabled=true;btn.innerHTML='Resend code in <span id="resetCounter">60</span>s';resetTimer=setInterval(()=>{resetSeconds--;const c=document.getElementById('resetCounter');if(c)c.textContent=resetSeconds;if(resetSeconds<=0){clearInterval(resetTimer);btn.disabled=false;btn.textContent='Resend reset code'}},1000)}
async function sendResetCode(){await Oyuki.Password.forgot(resetContact);Oyuki.Toast.show('If the account exists, a reset code has been sent.','success')}
document.getElementById('requestForm').addEventListener('submit',async event=>{event.preventDefault();resetContact=event.currentTarget.contact.value.trim();const btn=document.getElementById('requestBtn');btn.disabled=true;btn.textContent='Sending…';try{await sendResetCode();document.getElementById('requestStep').style.display='none';document.getElementById('resetStep').style.display='block';document.querySelector('#resetForm [name=contact]').value=resetContact;startResetCountdown()}catch(error){Oyuki.Toast.show(error.message,'error')}finally{btn.disabled=false;btn.textContent='Send reset code'}});
document.getElementById('resendResetBtn').onclick=async()=>{const btn=document.getElementById('resendResetBtn');btn.disabled=true;btn.textContent='Sending…';try{await sendResetCode();startResetCountdown()}catch(error){Oyuki.Toast.show(error.message,'error');btn.disabled=false;btn.textContent='Resend reset code'}};
document.getElementById('resetForm').addEventListener('submit',async event=>{event.preventDefault();const f=event.currentTarget;if(f.newPassword.value!==f.confirmPassword.value){Oyuki.Toast.show('Passwords do not match.','error');return}try{await Oyuki.Password.verify(f.contact.value.trim(),f.token.value.trim());await Oyuki.Password.reset(f.contact.value.trim(),f.token.value.trim(),f.newPassword.value,f.confirmPassword.value);Oyuki.Toast.show('Password changed successfully.','success');setTimeout(()=>location.href='login.html',900)}catch(error){Oyuki.Toast.show(error.message,'error')}});
</script>
</body></html>
