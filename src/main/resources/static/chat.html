<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Messages | Oyuki</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"><link rel="stylesheet" href="assets/css/style.css"></head><body><div id="oy-navbar"></div><main class="container section"><div class="chat-shell"><div class="d-flex justify-content-between align-items-center mb-3"><div><span class="eyebrow">Messages</span><h1 class="h3 mb-0" id="chatTitle">Conversation</h1></div><a href="feature-center.html" class="btn btn-outline-brand">All conversations</a></div><div id="chatMessages" class="chat-messages"><p class="text-muted">Loading conversation…</p></div><form id="messageForm" class="d-flex gap-2 mt-3"><textarea id="messageInput" class="form-control" rows="2" maxlength="3000" placeholder="Write a message…" required></textarea><button class="btn btn-brand px-4" type="submit"><i class="bi bi-send"></i></button></form></div></main><div id="oy-footer"></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/app.js"></script><script>
const me=Oyuki.Auth.require();
const params=new URLSearchParams(location.search), recipientId=params.get('recipientId'), productId=params.get('productId'), displayName=params.get('name')||'Seller';
if(!recipientId){document.getElementById('chatMessages').innerHTML='<div class="alert alert-warning">Open a product and click Message seller.</div>';document.getElementById('messageForm').classList.add('d-none');}
else{
 document.getElementById('chatTitle').textContent=displayName;
 async function loadConversation(){try{const rows=await Oyuki.Api.get('/chat/with/'+recipientId);const box=document.getElementById('chatMessages');box.innerHTML=rows.map(m=>`<div class="chat-bubble ${String(m.senderId)===String(me.id||me.userId)?'mine':''}"><div>${Oyuki.escapeHtml(m.message)}</div><div class="time">${Oyuki.date(m.createdAt)}</div></div>`).join('')||'<p class="text-muted text-center mt-5">No messages yet. Start the conversation.</p>';box.scrollTop=box.scrollHeight}catch(e){Oyuki.Toast.show(e.message,'error')}}
 document.getElementById('messageForm').addEventListener('submit',async e=>{e.preventDefault();const input=document.getElementById('messageInput'),text=input.value.trim();if(!text)return;try{await Oyuki.Api.post('/chat/messages',{recipientId,message:productId?`About product #${productId}: ${text}`:text});input.value='';await loadConversation()}catch(err){Oyuki.Toast.show(err.message,'error')}});
 loadConversation(); setInterval(loadConversation,10000);
}
</script></body></html>
