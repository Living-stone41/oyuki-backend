<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Cart | Oyuki</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="oy-navbar"></div>
<section class="section"><div class="container">
  <h1>Your cart</h1>
  <div class="row g-4 mt-1"><div class="col-lg-8"><div id="items"></div></div><div class="col-lg-4"><div class="panel" id="summary"></div></div></div>
  <section class="mt-5" id="recentSection" style="display:none"><div class="d-flex justify-content-between align-items-center"><h3>Recently viewed</h3><a href="shop.html" class="btn btn-sm btn-ghost">View marketplace</a></div><div class="row mt-2" id="recentProducts"></div></section>
  <section class="mt-5" id="popularSection" style="display:none"><h3>What other customers also viewed</h3><p class="text-muted">Popular products based on product-page views.</p><div class="row mt-2" id="popularProducts"></div></section>
</div></section>
<div id="oy-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{ if(!Oyuki.Auth.require('CUSTOMER'))return; await render(); });
async function render(){
  const box=document.getElementById('items'), summary=document.getElementById('summary');
  box.innerHTML='<div class="panel text-muted">Loading cart…</div>';
  try {
    const cart=await Oyuki.Cart.get(); const items=cart.items||[];
    if(!items.length){box.innerHTML='<div class="panel text-center text-muted py-5"><i class="bi bi-basket3 fs-1 d-block mb-2"></i>Your cart is empty.<div class="mt-3"><a href="shop.html" class="btn btn-brand">Continue shopping</a></div></div>';summary.innerHTML='';}
    else {
      box.innerHTML=items.map(i=>`<div class="panel mb-3 d-flex align-items-center gap-3"><img src="${Oyuki.imageUrl(i.primaryImageUrl)}" style="width:80px;height:80px;object-fit:cover;border-radius:10px"><div class="flex-grow-1"><div class="fw-semibold">${Oyuki.escapeHtml(i.productName)}</div><div class="text-muted small">${Oyuki.fmt(i.unitPrice)} / ${i.measurementValue} ${String(i.measurementUnit).replaceAll('_',' ')}</div></div><input type="number" min="1" max="${i.availableStock}" value="${i.quantity}" class="form-control" style="width:80px" onchange="updateQty(${i.cartItemId},this.value)"><div class="fw-semibold" style="min-width:90px;text-align:right">${Oyuki.fmt(i.lineTotal)}</div><button class="btn btn-sm btn-ghost" onclick="removeItem(${i.cartItemId})"><i class="bi bi-trash"></i></button></div>`).join('');
      summary.innerHTML=`<h5>Summary</h5><div class="d-flex justify-content-between"><span>Items</span><strong>${cart.totalItems}</strong></div><div class="d-flex justify-content-between mt-2"><span>Subtotal</span><strong>${Oyuki.fmt(cart.subtotal)}</strong></div><div class="d-flex justify-content-between text-muted small mt-1"><span>Delivery</span><span>Calculated at checkout</span></div><hr><a href="checkout.html" class="btn btn-brand w-100">Checkout</a><a href="shop.html" class="btn btn-ghost w-100 mt-2">Continue shopping</a>`;
    }
    await renderRecommendations(items.map(item=>item.productId));
  } catch(error){box.innerHTML=`<div class="alert alert-danger">${Oyuki.escapeHtml(error.message)}</div>`;summary.innerHTML='';await renderRecommendations([]);}
}
async function renderRecommendations(cartProductIds){
  const excluded=new Set((cartProductIds||[]).map(Number));
  const recent=Oyuki.Recommendations.recent(8).filter(p=>!excluded.has(Number(p.id))).slice(0,4);
  if(recent.length){recentSection.style.display='block';recentProducts.innerHTML=recent.map(Oyuki.productCard).join('');}
  else recentSection.style.display='none';
  try{const popular=await Oyuki.Recommendations.popular([...excluded,...recent.map(p=>Number(p.id))],4);if(popular.length){popularSection.style.display='block';popularProducts.innerHTML=popular.map(Oyuki.productCard).join('');}else popularSection.style.display='none';}catch(_){popularSection.style.display='none';}
}
async function updateQty(id,qty){try{await Oyuki.Cart.update(id,qty);await render();}catch(error){Oyuki.Toast.show(error.message,'error');await render();}}
async function removeItem(id){try{await Oyuki.Cart.remove(id);await render();}catch(error){Oyuki.Toast.show(error.message,'error');}}
</script>
</body></html>
