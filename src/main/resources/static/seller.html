<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/favicon.ico"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css"><title>Seller Dashboard | Oyuki</title></head><body class="dashboard-page" data-provider-role="SELLER"><div id="oy-navbar"></div><div class="oy-dashboard" id="dashboardShell"><aside class="oy-sidebar"><a class="oy-side-brand" href="home.html">Oyuki</a><div class="oy-side-user"><div class="oy-avatar"><i class="bi bi-person"></i></div><div class="name" id="who-name">—</div><div class="role">Seller</div><div class="oy-online">● Online</div></div><nav class="oy-side-nav"><a href="home.html"><i class="bi bi-house-door"></i>Home</a><a href="#dashboard" data-s="dashboard"><i class="bi bi-grid"></i>Dashboard</a><a href="#products" data-s="products"><i class="bi bi-box-seam"></i>Products</a><a href="#orders" data-s="orders"><i class="bi bi-bag"></i>Orders</a><a href="#sales" data-s="sales"><i class="bi bi-graph-up"></i>Sales</a><a href="#profile" data-s="profile"><i class="bi bi-person"></i>Profile & pickup</a><a href="#" onclick="Oyuki.Auth.logout();return false"><i class="bi bi-box-arrow-right"></i>Log out</a></nav></aside><div class="oy-dashboard-main"><header class="oy-topbar"><div class="oy-top-left"><button class="oy-menu-button" id="sideToggle"><i class="bi bi-list"></i></button><div class="oy-search"><i class="bi bi-search"></i><input placeholder="Search dashboard…"></div></div><div class="oy-top-actions"><a class="oy-icon-button" href="home.html" title="Go to home" aria-label="Go to home"><i class="bi bi-house-door"></i></a><button class="oy-icon-button"><i class="bi bi-bell"></i></button><button class="oy-icon-button"><i class="bi bi-person-circle"></i></button></div></header><div class="oy-dashboard-content"><div class="oy-page-head"><div><h1>Seller Dashboard</h1><p>Welcome back. Here is what is happening today.</p></div><div class="oy-date-chip"><i class="bi bi-calendar3 me-2"></i><span id="todayDate"></span></div></div><main id="view"><div class="panel text-center py-5"><div class="spinner-border text-success"></div></div></main></div></div></div><div id="oy-footer"></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/app.js"></script><script src="assets/js/nigeria-locations.js"></script><script src="assets/js/provider-dashboard.js"></script><script>document.getElementById('todayDate').textContent=new Date().toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'});document.getElementById('sideToggle').onclick=()=>document.getElementById('dashboardShell').classList.toggle('sidebar-open');document.querySelectorAll('.oy-side-nav a[data-s]').forEach(a=>a.addEventListener('click',()=>{document.querySelectorAll('.oy-side-nav a').forEach(x=>x.classList.remove('active'));a.classList.add('active');document.getElementById('dashboardShell').classList.remove('sidebar-open')}));</script></body></html>
