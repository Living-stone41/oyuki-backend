<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kitchens — Trusted Home Kitchens | Oyuki</title>
<meta name="description" content="Browse verified home kitchens near you. Order ready meals or send them your ingredients to cook.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="oy-navbar"></div>

<section class="section-sm" style="background:var(--brand-soft)">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div><span class="eyebrow">Kitchens</span><h1 class="mt-1 mb-0">Home cooks near you</h1></div>
    <a href="register.html?role=kitchen" class="btn btn-brand">Open your kitchen</a>
  </div>
</section>

<section class="section-sm">
  <div class="container">
    <div class="row g-3 mb-3">
      <div class="col-md-6"><input id="q" class="form-control" placeholder="Search by name, cuisine, or location…"></div>
      <div class="col-md-3"><select id="cuisine" class="form-select"><option value="">All cuisines</option><option>Nigerian</option><option>Continental</option><option>Grill & BBQ</option></select></div>
      <div class="col-md-3 text-md-end"><small class="text-muted" id="count"></small></div>
    </div>
    <div class="row" id="grid"></div>
  </div>
</section>

<div id="oy-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>

let kitchens=[];document.addEventListener('DOMContentLoaded',async()=>{const grid=document.getElementById('grid');grid.innerHTML='<div class="col-12 text-muted text-center py-5">Loading kitchens…</div>';try{const meals=await Oyuki.Products.list({productType:'READY_MEAL'});kitchens=Oyuki.kitchensFromProducts(meals);render();}catch(error){grid.innerHTML=`<div class="col-12 alert alert-danger">${Oyuki.escapeHtml(error.message)}</div>`;}document.getElementById('q').oninput=render;document.getElementById('cuisine').closest('.col-md-3').style.display='none';});function render(){const q=document.getElementById('q').value.toLowerCase();const list=kitchens.filter(k=>!q||k.name.toLowerCase().includes(q));document.getElementById('count').textContent=list.length+' kitchens';document.getElementById('grid').innerHTML=list.map(Oyuki.kitchenCard).join('')||'<div class="col-12 text-center text-muted py-5">No kitchens with active meals yet.</div>';}

</script>
</body></html>
